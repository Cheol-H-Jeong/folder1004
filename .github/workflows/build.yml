name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: ${{ matrix.os }} • Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux Qt runtime deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1

      - name: Install package + dev extras
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ "${{ runner.os }}" = "Windows" ]; then
            pip install -e ".[dev,windows]"
          else
            pip install -e ".[dev]"
          fi

      - name: Run tests (offscreen Qt)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

  package:
    name: Package ${{ matrix.os }}
    needs: test
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[verify-bundles]'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: folder1004-linux
            build_cmd: "bash scripts/build_linux.sh"
            output: "dist/folder1004"
          - os: macos-latest
            artifact: Folder1004-macOS
            build_cmd: "bash scripts/build_macos.sh"
            output: "dist/Folder1004.app"
          - os: windows-latest
            artifact: Folder1004-Windows
            output: "dist/folder1004"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Linux Qt runtime deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1
      - name: Install build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ "${{ runner.os }}" = "Windows" ]; then
            pip install -e ".[dev,windows]"
          else
            pip install -e ".[dev]"
          fi
      - name: Install Windows installer compiler
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --yes --no-progress
      - name: Build Unix bundle
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.build_cmd }}
      - name: Build Windows bundle and installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\build_windows.ps1 -PortableZip -Installer -RequireInstaller
      - name: Smoke test Unix bundle
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p smoke-folder1004
          printf 'hello\n' > smoke-folder1004/sample.txt
          dist/folder1004/folder1004 --cli --path smoke-folder1004 --mock --dry-run --quiet
      - name: Smoke test Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force smoke-folder1004 | Out-Null
          Set-Content -Path smoke-folder1004\sample.txt -Value 'hello'
          .\dist\folder1004\folder1004.exe --cli --path smoke-folder1004 --mock --dry-run --quiet
      - name: Verify Windows installer artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path .\dist\Folder1004-Setup.exe)) {
            throw "Missing installer: dist\Folder1004-Setup.exe"
          }
          $item = Get-Item .\dist\Folder1004-Setup.exe
          if ($item.Length -lt 1MB) {
            throw "Installer is unexpectedly small: $($item.Length) bytes"
          }
      - name: Verify Windows portable artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path .\dist\Folder1004-Windows-Portable.zip)) {
            throw "Missing portable ZIP: dist\Folder1004-Windows-Portable.zip"
          }
          $item = Get-Item .\dist\Folder1004-Windows-Portable.zip
          if ($item.Length -lt 1MB) {
            throw "Portable ZIP is unexpectedly small: $($item.Length) bytes"
          }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead(
            (Resolve-Path .\dist\Folder1004-Windows-Portable.zip).Path
          )
          try {
            $entries = $zip.Entries.FullName
            foreach ($required in @(
              "folder1004/folder1004.exe",
              "folder1004/folder1004.portable",
              "folder1004/PORTABLE_README.txt"
            )) {
              if ($entries -notcontains $required) {
                throw "Portable ZIP missing $required"
              }
            }
          } finally {
            $zip.Dispose()
          }
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.output }}
          if-no-files-found: error
      - name: Upload Windows installer artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Folder1004-Windows-Installer
          path: dist/Folder1004-Setup.exe
          if-no-files-found: error
      - name: Upload Windows portable ZIP artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Folder1004-Windows-Portable
          path: dist/Folder1004-Windows-Portable.zip
          if-no-files-found: error
      - name: Attach Windows installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view $env:TAG_NAME *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:TAG_NAME --title "Folder1004 $env:TAG_NAME" --notes "Automated Folder1004 release artifacts."
          }
          gh release upload $env:TAG_NAME .\dist\Folder1004-Setup.exe .\dist\Folder1004-Windows-Portable.zip --clobber
