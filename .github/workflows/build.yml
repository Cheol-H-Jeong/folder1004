name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} • Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux Qt runtime deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1

      - name: Install package + dev extras
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ "${{ runner.os }}" = "Windows" ]; then
            pip install -e ".[dev,windows]"
          else
            pip install -e ".[dev]"
          fi

      - name: Run tests (offscreen Qt)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

  package:
    name: Package ${{ matrix.os }}
    needs: test
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[verify-bundles]'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: folder1004-linux
            build_cmd: "bash scripts/build_linux.sh"
            output: "dist/folder1004"
          - os: macos-latest
            artifact: Folder1004-macOS
            build_cmd: "bash scripts/build_macos.sh"
            output: "dist/Folder1004.app"
          - os: windows-latest
            artifact: Folder1004-Windows
            output: "dist/folder1004"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Linux Qt runtime deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1
      - name: Install build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ "${{ runner.os }}" = "Windows" ]; then
            pip install -e ".[dev,windows]"
          else
            pip install -e ".[dev]"
          fi
      - name: Build Unix bundle
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.build_cmd }}
      - name: Build Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\build_windows.ps1
      - name: Smoke test Unix bundle
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p smoke-folder1004
          printf 'hello\n' > smoke-folder1004/sample.txt
          dist/folder1004/folder1004 --cli --path smoke-folder1004 --mock --dry-run --quiet
      - name: Smoke test Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force smoke-folder1004 | Out-Null
          Set-Content -Path smoke-folder1004\sample.txt -Value 'hello'
          .\dist\folder1004\folder1004.exe --cli --path smoke-folder1004 --mock --dry-run --quiet
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.output }}
          if-no-files-found: error
